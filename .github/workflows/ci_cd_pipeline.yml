name: Scientific Computing CI/CD Pipeline
on: [push]
jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install sympy sympy mypy
      - name: Type Checking
        run: mypy --config-file mypy.ini src/